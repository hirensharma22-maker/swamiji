<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Swamiji 3D AR - Hiren Sharma</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <a-asset-item id="swamiji-model" src="https://arjs-cors-proxy.herokuapp.com/https://raw.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb"></a-asset-item>
        </a-assets>

      <a-marker type="pattern" url="pattern-marker.patt">
        
        <a-entity 
          geometry="primitive: box; width: 1; height: 1; depth: 1"
          material="color: orange; opacity: 0.8"
          position="0 0.5 0"
          rotation="0 45 0"
          animation="property: rotation; to: 0 405 0; loop: true; dur: 3000">
        </a-entity>

        <a-text value="Utho, Jago ane Dhyey Prapti sudhi mathya raho!" 
                color="#FF5722" 
                position="-1.5 1.5 0" 
                rotation="-90 0 0" 
                width="4" 
                align="center">
        </a-text>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
