<!DOCTYPE html>
<html>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;'>
      
      <a-marker type='pattern' url='./pattern-vivekananda.patt'>
          <a-entity 
            position="0 0.5 0" 
            scale="0.05 0.05 0.05"
            gltf-model="url(https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb)">
          </a-entity>
          <a-text value="Swami Vivekananda" position="0 1.5 0" align="center" rotation="-90 0 0" color="orange"></a-text>
      </a-marker>

      <a-marker preset="hiro">
          <a-box position='0 0.5 0' material='color: green;'></a-box>
          <a-text value="Code Working!" position="0 1.2 0" align="center" rotation="-90 0 0"></a-text>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
