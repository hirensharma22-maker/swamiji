<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Swami Vivekananda 3D AR - Hiren Sharma</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <a-asset-item id="vivekananda-model" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BoomBox/glTF-Binary/BoomBox.glb"></a-asset-item>
        </a-assets>

      <a-marker type="pattern" url="pattern-vivekananda.patt">
        
        <a-entity 
          gltf-model="https://cdn.glitch.global/331a9829-17d4-42f5-93df-5c5f850e029c/Swami_Vivekananda_bust.glb?v=1680234567890" 
          scale="1.5 1.5 1.5" 
          position="0 0.1 0" 
          rotation="-90 0 0"
          animation-mixer> </a-entity>
        
        <a-text value="Swami Vivekananda" color="#E91E63" position="-0.8 1.1 0" rotation="-90 0 0" width="5" align="center"></a-text>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
