<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Vivekananda 3D AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <a-asset-item id="swamiji" src="https://cdn.glitch.global/331a9829-17d4-42f5-93df-5c5f850e029c/Swami_Vivekananda_bust.glb"></a-asset-item>
      </a-assets>

      <a-marker type="pattern" url="pattern-vivekananda.patt">
        
        <a-entity 
          gltf-model="#swamiji" 
          scale="0.5 0.5 0.5" 
          position="0 0 0" 
          rotation="-90 0 0">
        </a-entity>

        <a-text value="Utho, Jago!" color="orange" position="0 1 0" align="center" rotation="-90 0 0"></a-text>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
